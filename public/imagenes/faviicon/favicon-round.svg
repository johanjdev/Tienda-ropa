<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <style>
      .circle-bg { fill: #0a0a0a; }
      .circle-border { fill: none; stroke: #6b2ad4; stroke-width: 8; }
      .circle-inner { fill: #6b2ad4; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" class="circle-bg"/>
  
  <!-- Border circle -->
  <circle cx="96" cy="96" r="92" class="circle-border"/>
  
  <!-- Inner circle -->
  <circle cx="96" cy="96" r="60" class="circle-inner"/>
  
  <!-- Letter A -->
  <text x="96" y="115" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle">A</text>
</svg>
